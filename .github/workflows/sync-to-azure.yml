name: Sync to Azure

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: List files
        run: ls -la
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-code
          path: .
